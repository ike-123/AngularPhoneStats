<p>home works!</p>

<h1 *ngIf="jokes().length === 0">Loading </h1>

<h1 *ngIf="jokes().length !== 0">Counter Value = {{counter()}} </h1>


<div>
    @for (joke of jokes(); track joke.id){

        <div (click)="IncrementCounter()" class="jokeContainer">
            <h1>
                {{joke.joke}}
            </h1>
        </div>
    }
</div>
